global:
  scrape_interval: 1s # 为了在本地看实时效果，我们设置为 1 秒拉取一次（生产环境通常是 15s）

scrape_configs:
  - job_name: 'rpc_provider_nodes'
    static_configs:
      # 本机 IP (注意：如果用 Docker，不要写 127.0.0.1，写电脑的局域网 IP，比如 192.168.x.x)
      - targets: ['172.16.200.132:18001', '172.16.200.132:18002', '172.16.200.132:18003', '172.16.200.132:19001', '172.16.200.132:19002', '172.16.200.132:19003']
